<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Abstergo · Finanzas</title>
  <meta name="description" content="Abstergo — tu app personal de finanzas: gastos, rol de pago, tarjeta y deudas.">
  <meta name="theme-color" content="#0F0D0A">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Abstergo">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- Pantalla de bloqueo (PIN) -->
  <div class="lock" id="lock">
    <div class="lock-inner">
      <svg class="logo-mark big" viewBox="0 0 48 48" aria-hidden="true">
        <path fill-rule="evenodd" d="M24 3 L41 43 H30.8 L24 26.5 L17.2 43 H7 Z M24 12.5 L27.6 21 24 24.6 20.4 21 Z"/>
      </svg>
      <h1 class="lock-title">ABSTERGO</h1>
      <p class="lock-sub" id="lockSub">Ingresa tu PIN de 6 dígitos</p>
      <div class="dots" id="dots"></div>
      <div class="keypad" id="keypad"></div>
    </div>
  </div>

  <!-- Encabezado -->
  <header class="topbar">
    <div class="brand">
      <svg class="logo-mark" viewBox="0 0 48 48" aria-hidden="true">
        <path fill-rule="evenodd" d="M24 3 L41 43 H30.8 L24 26.5 L17.2 43 H7 Z M24 12.5 L27.6 21 24 24.6 20.4 21 Z"/>
      </svg>
      <span class="brand-name">ABSTERGO</span>
    </div>
    <button class="month-pill" id="monthBtn" aria-label="Cambiar mes">
      <span id="monthLabel">Mes</span>
      <svg viewBox="0 0 24 24" class="chev"><path d="M6 9l6 6 6-6"/></svg>
    </button>
  </header>

  <!-- Contenido dinámico -->
  <main id="view" class="view"></main>

  <!-- Botón flotante -->
  <button class="fab" id="fab" aria-label="Agregar movimiento">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <!-- Barra inferior de módulos -->
  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-tab="inicio">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg>
      Inicio
    </button>
    <button class="tab" data-tab="gastos">
      <svg viewBox="0 0 24 24"><path d="M4 7h13a1 1 0 0 1 1 1v1h2a1 1 0 0 1 1 1v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a1 1 0 0 1 1-1z"/><circle cx="16.5" cy="14" r="1.6"/></svg>
      Gastos
    </button>
    <button class="tab" data-tab="rol">
      <svg viewBox="0 0 24 24"><path d="M6 3h9l3 3v15H6z"/><path d="M9 10h6M9 14h6"/></svg>
      Rol
    </button>
    <button class="tab" data-tab="tarjeta">
      <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10.5h18"/></svg>
      Tarjeta
    </button>
    <button class="tab" data-tab="mas">
      <svg viewBox="0 0 24 24"><circle cx="7" cy="7" r="1.7"/><circle cx="17" cy="7" r="1.7"/><circle cx="7" cy="17" r="1.7"/><circle cx="17" cy="17" r="1.7"/></svg>
      Más
    </button>
  </nav>

  <!-- Hoja modal (formularios) -->
  <div class="sheet-backdrop" id="backdrop"></div>
  <section class="sheet" id="sheet" role="dialog" aria-modal="true">
    <div class="sheet-grip"></div>
    <div class="sheet-body" id="sheetBody"></div>
  </section>

  <!-- Burbuja del asistente -->
  <button class="bubble" id="bubble">
    <span class="bubble-emo">🤖</span>
    <span class="bubble-txt" id="bubbleTxt"></span>
  </button>

  <!-- Aviso flotante -->
  <div class="toast" id="toast"></div>
</div>

<script src="app.js"></script>
<script>
  // Modo offline: registra el service worker
  if ('serviceWorker' in navigator) {
    addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
</script>
</body>
</html>
